name: USDCHF Bot

on:
  schedule:
    # Runs every hour at the 0 minute mark, but only during 
    # active market hours (07:00 to 18:00 UTC) to save Action Minutes.
    - cron: "0 7-18 * * *"
  workflow_dispatch: # Allows you to trigger it manually anytime

# Add permissions to ensure the runner can read the repository
permissions:
  contents: read

# Prevents multiple runs from overlapping
concurrency:
  group: usdchf-trading
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # Speeds up the run by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # Added a timeout to ensure a stuck process doesn't waste minutes
        run: timeout 10m python usdchf_bot.py

      - name: Upload signals log
        if: always() # Uploads even if the bot fails (good for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: usdchf_signals
          path: usdchf_signals.csv
          retention-days: 7 # Keeps storage clean

name: USDCHF Bot

on:
  schedule:
    - cron: "0 12 * * *"   # runs daily at 12:00 UTC (15:00 EAT)
  workflow_dispatch:       # allows manual run from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # updated to latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python usdchf_bot.py

      - name: Upload signals log
        uses: actions/upload-artifact@v4   # updated to v4
        with:
          name: usdchf_signals
          path: usdchf_signals.csv
